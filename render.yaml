services:
  - type: web
    name: biolinkms-api
    runtime: python
    region: virginia
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: BioLink MS
      - key: APP_VERSION
        value: 2.0.0
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
      - key: DATABASE_POOL_SIZE
        value: "10"
      - key: DATABASE_MAX_OVERFLOW
        value: "20"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_DEFAULT
        value: "100/minute"
      - key: RATE_LIMIT_AUTH
        value: "5/minute"
      - key: ENABLE_METRICS
        value: "true"
      - key: MAX_UPLOAD_SIZE
        value: "10485760"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: biolinkms-db
    databaseName: biolinkms
    user: biolinkms
    plan: starter
    region: virginia